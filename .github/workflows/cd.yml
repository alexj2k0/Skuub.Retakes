name: CD

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 162.55.52.132
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /root/deploy-csgo-retakes.sh

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: CD deploy
          description: "${{ job.status == 'success' && 'Deployed to VPS and server restarted' || 'Deploy failed' }}"
          color: ${{ job.status == 'success' && 0x00ff00 || 0xff0000 }}
