name: CI

on:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile plugins
        run: |
          cd csgo/addons/sourcemod/scripting
          chmod +x spcomp64
          # Sub-plugins that depend on external includes or parent plugin symbols
          SKIP="multi1v1.sp retakes_pistolallocator.sp retakes_sitepicker.sp retakes_standardallocator.sp"
          FAILED=0
          for src in *.sp; do
            skip=0
            for s in $SKIP; do [ "$src" = "$s" ] && skip=1; done
            [ $skip -eq 1 ] && echo "::warning::Skipping $src (needs external deps)" && continue
            echo "::group::Compiling $src"
            if ./spcomp64 -iinclude "$src" -ocompiled/$(basename "$src" .sp).smx; then
              echo "OK"
            else
              echo "::error::Compilation failed: $src"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED

      - name: Upload compiled plugins
        uses: actions/upload-artifact@v4
        with:
          name: compiled-plugins
          path: csgo/addons/sourcemod/scripting/compiled/*.smx

