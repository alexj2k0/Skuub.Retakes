hostname "CS:GO Legacy Retakes"
exec private/rcon_password.cfg
exec private/gslt.cfg
sv_password ""

sv_lan 0
sv_region 255
sv_tags "retakes,1v1,movement,csgo,legacy,128tick"
sv_hibernate_when_empty 0
sv_pure 0
sv_cheats 0

host_info_show 2
host_players_show 2
sv_allowdownload 1
sv_downloadurl "http://skuub.xyz/fastdl"
sv_allowupload 0

mp_autoteambalance 0
mp_limitteams 0
mp_freezetime 3
mp_round_restart_delay 2
mp_friendlyfire 0
mp_forcecamera 1

log on
sv_logfile 1
sv_logecho 1

exec banned_user.cfg
exec banned_ip.cfg
