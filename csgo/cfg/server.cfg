hostname "CS:GO Legacy Retakes"
exec private/rcon_password.cfg
exec private/gslt.cfg
sv_password ""

sv_lan 0
sv_region 255
sv_tags "retakes,1v1,movement,csgo,legacy,128tick"
sv_hibernate_when_empty 0
sv_pure 0
sv_cheats 0

host_info_show 0
host_players_show 0
sv_allowdownload 1
sv_downloadurl "http://skuub.xyz/fastdl"
sv_allowupload 0

mp_autoteambalance 0
mp_limitteams 0
mp_freezetime 3
mp_round_restart_delay 2
mp_friendlyfire 0
mp_forcecamera 1

// 128-tick network rate settings
sv_minrate 196608
sv_maxrate 786432
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_client_cmdrate_difference 0

// Performance tweaks
sv_parallel_packentities 1
sv_parallel_sendsnapshot 0
sv_clamp_unsafe_velocities 0
net_splitpacket_maxrate 1048576

log on
sv_logfile 1
sv_logecho 1

exec banned_user.cfg
exec banned_ip.cfg
