// ConVars for plugin "retakes_buyphases.smx"


// Number of retake rounds after pistol rounds using force loadouts.
// -
// Default: "3"
// Minimum: "0.000000"
sm_retakes_buy_force_rounds "3"

// Retake freeze time in seconds.
// -
// Default: "3"
// Minimum: "1.000000"
sm_retakes_buy_freezetime "3"

// Number of opening retake rounds using pistol loadouts.
// -
// Default: "2"
// Minimum: "0.000000"
sm_retakes_buy_pistol_rounds "2"
