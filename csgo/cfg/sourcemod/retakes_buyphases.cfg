// ConVars for plugin "retakes_buyphases.smx"


// Number of AWP-enabled rounds in each full-buy AWP cycle.
// -
// Default: "3"
// Minimum: "0.000000"
// Maximum: "32.000000"
sm_retakes_buy_awp_cycle_enabled_rounds "3"

// Number of full-buy rounds in each shuffled AWP availability cycle.
// -
// Default: "5"
// Minimum: "1.000000"
// Maximum: "32.000000"
sm_retakes_buy_awp_cycle_length "5"

// Number of retake rounds after pistol rounds using force loadouts.
// -
// Default: "3"
// Minimum: "0.000000"
sm_retakes_buy_force_rounds "3"

// Retake freeze time in seconds.
// -
// Default: "3"
// Minimum: "1.000000"
sm_retakes_buy_freezetime "3"

// Number of opening retake rounds using pistol loadouts.
// -
// Default: "2"
// Minimum: "0.000000"
sm_retakes_buy_pistol_rounds "2"
