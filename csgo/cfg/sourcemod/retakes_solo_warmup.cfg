// Map used while exactly one human is on the server.
sm_solo_warmup_map "kz_phamous"

// Additional comma-separated movement maps available from !solo / !movement.
sm_solo_warmup_maps "surf_utopia_v3,surf_summit_csgo,kz_beginnerblock_go,kz_breezeblocks,kz_galaxy_go2,kz_hillside,kz_lego,kz_paradise,kz_summercliff2_go,kz_woodstock_v2,kz_redemption_csgo,kz_minimal_combo,kz_sandstone_mq,kz_pollution,kz_unity_collab"

// Default map used for 1v1 mode.
sm_1v1_map "am_ramps"

// Additional comma-separated 1v1 maps available from !1v1 / !mode.
sm_1v1_maps "am_courtyard,am_grass2,am_water"

// Empty returns to the previous retakes map. Set this to force a fixed return map.
sm_solo_warmup_return_map ""

// Seconds to wait before returning from solo movement mode to retakes after a second human joins.
sm_solo_warmup_return_countdown "10"
